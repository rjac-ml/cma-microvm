# Pre-commit hooks — ruff validates Python (constitution: pre-commit with ruff).
# Install hooks:  pre-commit install
# Run on demand:  pre-commit run --all-files   (also: `just lint` / `just format-check`)

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.3
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-added-large-files