# Local parity for the launcher (constitution Factor X).
#
# Brings up DynamoDB Local, creates the idempotency table, and runs the SAME
# container image that deploys to AWS — but under uvicorn instead of the Lambda
# Runtime Interface. The AWS Lambda Python base image's `/lambda-entrypoint.sh`
# requires exactly one argument (the handler), so to run uvicorn or the init
# script we override `entrypoint:` to `/var/lang/bin/python3` and pass args via
# `command:`. The base image does not export PYTHONPATH, so it is set explicitly
# to /var/task (where the Dockerfile lays down deps + the `launcher` package).
# Signature verification is skipped locally (no signing secret configured); set
# SIGNING_SECRET_ARN to enable it.
#
#   docker compose up        # http://localhost:8080/webhook + /healthz
#   docker compose down

services:
  dynamodb-local:
    image: amazon/dynamodb-local:2.5.2
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    ports:
      - "8000:8000"

  dynamodb-init:
    build:
      context: .
      dockerfile: container/Dockerfile
    working_dir: /var/task
    entrypoint: ["/var/lang/bin/python3"]
    command: ["/var/task/dynamodb_init.py"]
    environment:
      PYTHONPATH: /var/task
      AWS_ENDPOINT_URL_DYNAMODB: http://dynamodb-local:8000
      AWS_REGION: us-west-2
      IDEMPOTENCY_TABLE: launcher-idempotency
    volumes:
      - ./container/dynamodb_init.py:/var/task/dynamodb_init.py:ro
    depends_on:
      - dynamodb-local
    restart: "no"

  launcher:
    build:
      context: .
      dockerfile: container/Dockerfile
    working_dir: /var/task
    entrypoint: ["/var/lang/bin/python3"]
    command:
      [
        "-m",
        "uvicorn",
        "launcher.app:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8080",
      ]
    ports:
      - "8080:8080"
    environment:
      PYTHONPATH: /var/task
      LAUNCHER_USE_STUB: "1"
      IDEMPOTENCY_TABLE: launcher-idempotency
      AWS_ENDPOINT_URL_DYNAMODB: http://dynamodb-local:8000
      AWS_REGION: us-west-2
      ANTHROPIC_ENVIRONMENT_ID: env_local
      MICROVM_IMAGE_IDENTIFIER: img_local
      ENVIRONMENT_KEY_SECRET_ARN: arn:aws:secrets:us-west-2:1:secret:envkey-local
      MICROVM_EXECUTION_ROLE_ARN: arn:aws:iam::1:role/microvm-exec-local
    depends_on:
      dynamodb-init:
        condition: service_completed_successfully